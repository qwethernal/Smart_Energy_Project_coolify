name: Smart Energy CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    name: Security & Dependency Audit
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  tests:
    runs-on: ubuntu-latest
    name: Unit Tests
    needs: security-audit
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test
        continue-on-error: false

  build:
    runs-on: ubuntu-latest
    name: Build Docker Image
    needs: tests
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: smart-energy-control:${{ github.sha }}
          file: ./Dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Coolify
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3
      
      - name: Trigger Coolify Deployment
        run: |
          echo "Deployment to Coolify triggered"
          echo "Webhook URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}"
          if [ ! -z "${{ secrets.COOLIFY_WEBHOOK_URL }}" ]; then
            curl -X POST \
              -H "Content-Type: application/json" \
              -d '{"ref":"main","sha":"${{ github.sha }}"}' \
              "${{ secrets.COOLIFY_WEBHOOK_URL }}"
          fi
        continue-on-error: true
      
      - name: Post Deployment Status
        if: always()
        run: |
          echo "Build SHA: ${{ github.sha }}"
          echo "Build Status: ${{ job.status }}"
          echo "Check Coolify dashboard for deployment progress"

  notify:
    runs-on: ubuntu-latest
    name: Notify on Completion
    needs: [deploy]
    if: always()
    steps:
      - name: Build Summary
        run: |
          echo "CI/CD Pipeline completed"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
