<!doctype html><html><head><meta charset="utf-8"><title>Devices</title><link rel="stylesheet" href="/styles.css"></head><body><div id="nav"></div><main class="container"><h1>Устройства</h1><div class="item"><h2>Добавить / изменить</h2><input id="id" type="hidden"><div class="row"><input id="name" placeholder="Название"><input id="price_limit" type="number" step="0.001" placeholder="Лимит €/kWh"><input id="power_kw" type="number" step="0.1" placeholder="Мощность kW"></div><textarea id="description" placeholder="Описание"></textarea><div class="row"><select id="connection_type"><option value="demo">demo</option><option value="api">api</option><option value="mqtt">mqtt</option><option value="ip">ip</option></select><input id="connection_value" placeholder="IP / API endpoint / MQTT topic"><label><input id="critical" type="checkbox"> Критическое устройство</label></div><button onclick="saveDevice()">Сохранить</button><p id="msg" class="warn"></p></div><div id="list" class="grid"></div></main><script src="/app.js"></script><script src="/devices.js"></script></body></html>
